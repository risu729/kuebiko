name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ case(github.event_name == 'pull_request', github.event.pull_request.number, github.ref) }}
  cancel-in-progress: true
permissions: {}
defaults:
  run:
    shell: bash
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: 2026.7.12
      - name: Run lint
        run: mise run check --lint
        env:
          GITHUB_TOKEN: ${{ github.token }}
  test:
    name: Test
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: 2026.7.12
      - name: Test
        run: mise run test
  e2e:
    name: E2E
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: 2026.7.12
      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@2e1d749697dd1612b833dba4a722266286fbefcd # v2.1.2
      - name: Run E2E
        run: mise run test-e2e
        env:
          E2E_BROWSER_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 10
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            runner: ubuntu-24.04
            target: linux-x64
            binary: ./dist/kuebiko-linux-x64
          - name: macOS arm64
            runner: macos-latest
            target: macos-arm64
            binary: ./dist/kuebiko-macos-arm64
          - name: Windows x64
            runner: windows-latest
            target: windows-x64
            binary: ./dist/kuebiko-windows-x64.exe
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: 2026.7.12
      - name: Compile binary
        if: runner.os != 'Windows'
        run: mise run compile --target "${COMPILE_TARGET}"
        env:
          COMPILE_TARGET: ${{ matrix.target }}
      - name: Smoke test binary
        if: runner.os != 'Windows'
        run: |
          test -f "${BINARY_PATH}"
          "${BINARY_PATH}" --help
        env:
          BINARY_PATH: ${{ matrix.binary }}
      - name: Compile binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: mise run compile --target $env:COMPILE_TARGET
        env:
          COMPILE_TARGET: ${{ matrix.target }}
      - name: Smoke test binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Test-Path -PathType Leaf $env:BINARY_PATH)) {
            throw "Expected binary does not exist: $env:BINARY_PATH"
          }
          & $env:BINARY_PATH --help
        env:
          BINARY_PATH: ${{ matrix.binary }}
  ci-check:
    name: CI Check
    needs:
      - lint
      - test
      - e2e
      - build
    if: ${{ !cancelled() && (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')) }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions: {}
    steps:
      - run: exit 1
  actions-timeline:
    name: Generate Actions Timeline
    needs:
      - ci-check
    if: always() && !cancelled()
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      actions: read # Required by actions-timeline to read this workflow run's jobs.
    steps:
      - name: actions-timeline
        uses: Kesin11/actions-timeline@7bf79990b7c09f5dfb570ac30b814ca597bd538e # v3.1.1
