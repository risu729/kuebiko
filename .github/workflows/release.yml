name: Release
on:
  push:
    branches:
      - main
  workflow_dispatch:
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false
permissions: {}
defaults:
  run:
    shell: bash
jobs:
  validate:
    name: CI
    permissions:
      actions: read # actions-timeline reads workflow run metadata
      contents: read # CI jobs check out the repository
    uses: ./.github/workflows/ci.yml
  release:
    name: Release
    needs:
      - validate
    if: github.ref == 'refs/heads/main' && github.repository_owner == 'risu729'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: write # semantic-release creates tags and GitHub releases
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: 2026.7.12
      - name: Install dependencies
        run: mise deps
      - name: Release
        run: semantic-release
        env:
          GITHUB_TOKEN: ${{ github.token }}
